<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>英検準1級をひとつひとつわかりやすく。2章 名詞</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --primary-navy: #2c3e50;
            --accent-orange: #e67e22;
            --text-dark: #34495e;
            --white: #ffffff;
            --error-red: #e74c3c;
            --success-green: #27ae60;
            --base-font: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
        }

        body { font-family: var(--base-font); background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background-color: var(--primary-navy); color: white; width: 100%; padding: 15px 0; text-align: center; }
        
        .tabs { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; justify-content: center; padding: 0 10px; }
        .tab-btn { padding: 8px 12px; border: none; background: #bdc3c7; cursor: pointer; border-radius: 5px 5px 0 0; font-weight: bold; font-size: 0.85rem; }
        .tab-btn.active { background: var(--white); color: var(--primary-navy); border-top: 3px solid var(--accent-orange); }

        .container { max-width: 750px; width: 95%; background: var(--white); padding: 25px; border-radius: 0 0 20px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; margin-bottom: 40px; }
        .hidden { display: none; }

        .word-display-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .word-display { font-size: 1.6rem; font-weight: bold; color: var(--primary-navy); line-height: 1.5; }
        .left-align { text-align: left; font-size: 1.1rem; padding: 0 15px; font-weight: normal; }
        
        .speaker-btn { background: #e1f5fe; border: 2px solid #03a9f4; color: #03a9f4; font-size: 1.2rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .speaker-btn:hover { background: #03a9f4; color: white; }

        .instruction { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; }
        input[type="text"] { font-size: 1.3rem; padding: 12px; width: 85%; border: 2px solid #bdc3c7; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .choice-btn { background: var(--white); border: 2px solid #bdc3c7; padding: 12px 5px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .choice-btn.correct { background: var(--success-green) !important; color: white; border-color: var(--success-green); }
        .choice-btn.wrong { background: var(--error-red) !important; color: white; border-color: var(--error-red); }
        
        .action-btn { background: var(--primary-navy); color: white; border: none; padding: 15px; border-radius: 30px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }
        .feedback-box { margin-top: 15px; padding: 15px; border-radius: 10px; background: #f1f8e9; text-align: left; font-size: 0.95rem; line-height: 1.4; border-left: 5px solid var(--success-green); }
        .trans-box { margin-top: 10px; font-size: 1rem; color: var(--accent-orange); font-weight: bold; background: #fff3e0; padding: 10px; border-radius: 8px; text-align: center; }

        /* 印刷用設定（PDF出力） */
        @media print {
            header, .tabs, .action-btn, .speaker-btn, #q-feedback, .choices-grid, #progress, .no-print, button { display: none !important; }
            body { background: white; }
            .container { box-shadow: none; border: none; width: 100%; padding: 5; margin: 5; }
            .print-only { display: block !important; }
            .worksheet-item { text-align: left; margin-bottom: 20px; border-bottom: none; padding-bottom: 0; line-height: 1.7; font-size: 1.0rem; }
            .blank-line { display: inline-block; border-bottom: 1.7px solid #000; width: 250px; margin: 0 0px; vertical-align: bottom; }
            h3 { border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 5px; }
        }
    </style>
</head>

<header><h1>英検準1級をひとつひとつわかりやすく。2章 名詞</h1></header>

<div class="tabs no-print">
    <button class="tab-btn active" onclick="showPart(1)">Part 1: 派生</button>
    <button class="tab-btn" onclick="showPart(2)">Part 2: 接辞</button>
    <button class="tab-btn" onclick="showPart(3)">Part 3: 語彙</button>
    <button class="tab-btn" onclick="showPart(4)">Part 4: 穴埋</button>
    <button class="tab-btn" onclick="showPart(5)">Part 5: 復習</button>
</div>

<div id="input-container" class="container part-content no-print">

    <p class="instruction">名詞形を入力しなさい。</p>

    <input type="text" id="in-box" placeholder="Type answer..." autocomplete="off">
    <div id="in-trans-box" class="trans-box hidden"></div>
    <div id="in-feedback" style="margin-top:10px; font-weight:bold;"></div>
    <button class="action-btn" id="in-check-btn" onclick="checkInput()">Check Answer</button>
    <button class="action-btn hidden" id="in-next-btn" onclick="handleNext()">Next Question</button>
    <button class="action-btn" style="background:#7f8c8d" onclick="toggleInTrans()">Translation</button>
</div>

<div id="choice-container" class="container part-content hidden no-print">
    <div id="ch-progress" class="instruction"></div>
    <div class="word-display-area">
        <div id="ch-q" class="word-display"></div>
        <button id="spk-btn" class="speaker-btn" onclick="speakCurrentWord()">🔊</button>
    </div>
    <div id="ch-choices" class="choices-grid"></div>
    <div id="q-feedback" class="feedback-box hidden"></div>
    <button id="ch-next-btn" class="action-btn hidden" onclick="handleNext()">Next Question</button>
</div>

<div id="result-screen" class="container hidden no-print">
    <h2>完了！</h2>
    <p>スコア: <span id="final-score" style="font-size:2.5rem; color:var(--accent-orange);"></span></p>
    <button class="action-btn" onclick="sendEmail()">Tamaki先生に報告</button>
    <button class="action-btn" style="background:#7f8c8d" onclick="location.reload()">Reset</button>
</div>

<div id="worksheet" class="container print-only hidden">

// --- Logic ---
let curP = 1, curI = 0, score = 0, curL = [], ansd = false;

// フィッシャー・イェーツのシャッフルアルゴリズム
function shuffle(array) {
    let a = [...array];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function speak(txt) {
    window.speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(txt);
    u.lang = "en-US"; u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

function speakCurrentWord() {
    if (curL[curI]) {
        // Part 4は読み上げない（ボタンも非表示だが念のため）
        if (curP === 4) return;
        speak(curL[curI].q);
    }
}

function showPart(p) {
    curP = p; curI = 0; score = 0;
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === p-1));

    else spk.style.display = "none";

    const qDisp = document.getElementById('ch-q');
    if (p === 4) qDisp.classList.add('left-align');
    else qDisp.classList.remove('left-align');

    if (p === 1) { document.getElementById('input-container').classList.remove('hidden'); loadIn(); }
    else { document.getElementById('choice-container').classList.remove('hidden'); loadCh(); }
}

function loadIn() {
    ansd = false; const d = curL[curI];
    document.getElementById('in-progress').innerText = `${curI + 1} / ${curL.length}`;
    document.getElementById('in-q').innerText = d.q;
    document.getElementById('in-box').value = ""; document.getElementById('in-box').disabled = false;
    document.getElementById('in-trans-box').classList.add('hidden');
    document.getElementById('in-feedback').innerText = "";
    document.getElementById('in-check-btn').classList.remove('hidden');
    document.getElementById('in-next-btn').classList.add('hidden');
    document.getElementById('in-box').focus();
}

function checkInput() {
    const v = document.getElementById('in-box').value.trim().toLowerCase();
    if (v === curL[curI].a.toLowerCase()) {
        score++; ansd = true;
        document.getElementById('in-feedback').innerHTML = "<span style='color:var(--success-green)'>Correct! ✨</span>";
        document.getElementById('in-box').disabled = true;
        document.getElementById('in-check-btn').classList.add('hidden');
        document.getElementById('in-next-btn').classList.remove('hidden');
    } else { document.getElementById('in-feedback').innerHTML = "<span style='color:var(--error-red)'>Try Again!</span>"; }
}

function loadCh() {
    ansd = false; const d = curL[curI];
    document.getElementById('ch-progress').innerText = `${curI + 1} / ${curL.length}`;
    const qDisp = document.getElementById('ch-q');
    if (curP === 4) {
        qDisp.innerHTML = `<b>Question:</b><br>${d.q}`;
    } else {
        qDisp.innerHTML = d.q;
    }
    document.getElementById('q-feedback').classList.add('hidden');
    document.getElementById('ch-next-btn').classList.add('hidden');
    const cont = document.getElementById('ch-choices'); cont.innerHTML = "";
    
    // 選択肢を毎回シャッフル
    const choices = shuffle([d.a, ...d.c]);
    
    choices.forEach(c => {
        const btn = document.createElement('button'); btn.className = "choice-btn"; btn.innerText = c;
        btn.onclick = () => {
            if (ansd) return; ansd = true;
            if (c === d.a) {
                btn.classList.add('correct'); score++;
                let fb = "<b>Correct! ✨</b>";
                if (curP === 2) fb += `<br>例: ${d.ex}`;
                document.getElementById('q-feedback').innerHTML = fb;
                if (curP === 4) qDisp.innerHTML = `<b>Question:</b><br>${d.q.replace("( )", `<span style="color:var(--success-green); text-decoration: underline;">(${d.a})</span>`)}`;
            } else { 
                btn.classList.add('wrong'); 
                document.getElementById('q-feedback').innerHTML = `<span style='color:var(--error-red)'>Incorrect. 正解: ${d.a}</span>`; 
            }
            document.getElementById('q-feedback').classList.remove('hidden');
            document.getElementById('ch-next-btn').classList.remove('hidden');
        };
        cont.appendChild(btn);
    });
}

function handleNext() {
    curI++; if (curI < curL.length) { if (curP === 1) loadIn(); else loadCh(); } else { showRes(); }
}

function toggleInTrans() { document.getElementById('in-trans-box').innerText = curL[curI].t; document.getElementById('in-trans-box').classList.toggle('hidden'); }

function showRes() {
    document.querySelectorAll('.part-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = score;
}

function sendEmail() {
    const email = "tamaki@eigostudio-stepforward.com";
    const sub = encodeURIComponent(`英検準1級 名詞 学習報告 Part${curP}`);
    const body = encodeURIComponent(`Part: ${curP}\nScore: ${score} / ${curL.length}\n頑張りました！`);
    window.location.href = `mailto:${email}?subject=${sub}&body=${body}`;
}

window.onbeforeprint = () => {
    const ws = document.getElementById('ws-content'); ws.innerHTML = "";
    const h1 = document.createElement('h3'); h1.innerText = "■ Part 1: Derivative Nouns (名詞に変えなさい)"; ws.appendChild(h1);
    p1Data.forEach((d, i) => {
        const div = document.createElement('div'); div.className="worksheet-item";
        div.innerHTML = `${i+1}. ${d.q} → <span class="blank-line"></span> (${d.t})`; ws.appendChild(div);
    });
    const h4 = document.createElement('h3'); h4.innerText = "■ Part 4: Sentence Completion (空欄を埋めなさい)"; ws.appendChild(h4);
    p4Data.forEach((d, i) => {
        const div = document.createElement('div'); div.className="worksheet-item";
        const shuffledChoices = shuffle([d.a, ...d.c]);
        div.innerHTML = `${i+1}. ${d.q.replace("( )", "________________________________")}<br>Choices: [ ${shuffledChoices.join(", ")} ]`; ws.appendChild(div);
    });
};

window.onload = () => showPart(1);
</script>
